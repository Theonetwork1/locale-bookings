<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goudela Transfer | Transfert d'argent rapide en Haïti</title>
    <meta
      name="description"
      content="Envoyez de l'argent et rechargez des téléphones instantanément avec Goudela Transfer. Sécurisé, rapide et fiable."
    />
    <meta name="keywords" content="transfert argent, haiti, moncash, natcash, recharge, digicel, natcom" />
    <meta name="theme-color" content="#f97316" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Fix pour éviter les erreurs de Service Worker au chargement
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) { registration.unregister(); }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
